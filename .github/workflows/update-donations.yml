name: Update donation total

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:
    inputs:
      send_emails:
        description: "Actually send thank-you emails (otherwise dry run unless SENDING_ENABLED is true)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-donations
  cancel-in-progress: false

jobs:
  update-total:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Sum successful charges from Stripe
        env:
          STRIPE_KEY: ${{ secrets.STRIPE_RESTRICTED_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${STRIPE_KEY}" ]; then
            echo "STRIPE_RESTRICTED_KEY secret is not set." >&2
            exit 1
          fi
          bash scripts/fetch-charges.sh "$RUNNER_TEMP/charges.json"
          total=$(jq '[.[] | .amount - .amount_refunded] | add // 0' "$RUNNER_TEMP/charges.json")
          echo "Total raised: ${total} pence"
          echo "TOTAL_PENCE=${total}" >> "$GITHUB_ENV"

      - name: Commit updated total if it changed
        run: |
          set -euo pipefail
          current=$(jq '.total_pence' data/donations.json 2>/dev/null || echo "")
          if [ "$current" = "$TOTAL_PENCE" ]; then
            echo "Total unchanged (${TOTAL_PENCE} pence); nothing to commit."
            exit 0
          fi
          mkdir -p data
          jq --null-input \
            --argjson total "$TOTAL_PENCE" \
            --arg updated "$(date --utc +%Y-%m-%dT%H:%M:%SZ)" \
            '{ total_pence: $total, goal_pence: 70000, currency: "gbp", updated: $updated }' \
            > data/donations.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/donations.json
          git commit -m "Update donation total to £$(awk "BEGIN { printf \"%.2f\", $TOTAL_PENCE / 100 }")"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected, retrying with rebase (attempt $i)..."
            git fetch origin master
            git rebase origin/master || { git rebase --abort; exit 1; }
          done
          echo "Push failed after retries" >&2
          exit 1

      - name: Send thank-you emails to new donors
        env:
          ZEPTOMAIL_TOKEN: ${{ secrets.ZEPTOMAIL_TOKEN }}
          CHARGES_FILE: ${{ runner.temp }}/charges.json
          REPORT_FILE: ${{ runner.temp }}/thank-you-dry-run.md
          # Master switch for automated sending. Euan approved the first
          # batch (8 donors) on 16 July 2026; scheduled runs now send to
          # any new donor not yet in data/donors-emailed.json.
          SENDING_ENABLED: "true"
          # One-off manual override used for the first approved batch send.
          SEND_EMAILS_INPUT: ${{ inputs.send_emails }}
        run: node scripts/send-thank-you-emails.mjs

      - name: Upload dry-run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thank-you-dry-run-report
          path: ${{ runner.temp }}/thank-you-dry-run.md
          if-no-files-found: ignore

      - name: Commit updated email ledger
        if: always()
        run: |
          set -euo pipefail
          if git diff --quiet -- data/donors-emailed.json; then
            echo "Ledger unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/donors-emailed.json
          git commit -m "Record thank-you emails sent"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected, retrying with rebase (attempt $i)..."
            git fetch origin master
            git rebase origin/master || { git rebase --abort; exit 1; }
          done
          echo "Push failed after retries" >&2
          exit 1
